name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install black isort flake8 flake8-bugbear

      - name: Run Black
        run: black --check --line-length=88 .

      - name: Run isort
        run: isort --check-only --profile=black --line-length=88 .

      - name: Run Flake8
        run: flake8 .
